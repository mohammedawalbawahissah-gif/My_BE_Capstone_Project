{% extends "base.html" %}

{% block title %}Create Emergency Alert{% endblock %}

{% block content %}
<div class="container">
    <h2>Create Emergency Alert</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-danger">Submit Alert</button>
    </form>
</div>
{% endblock %}
