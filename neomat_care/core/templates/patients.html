{% extends "base.html" %}

{% block title %}Patients{% endblock %}

{% block content %}
<h2>Patients List</h2>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <!-- Loop through patients here -->
        {% for patient in patients %}
        <tr>
            <td>{{ patient.id }}</td>
            <td>{{ patient.name }}</td>
            <td>{{ patient.age }}</td>
            <td>{{ patient.gender }}</td>
            <td>
                <a href="{% url 'patient_detail' patient.id %}">View</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No patients yet.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
