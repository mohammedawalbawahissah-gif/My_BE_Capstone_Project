{% extends "base.html" %}

{% block content %}
<h1>Delete Patient: {{ patient.first_name }} {{ patient.last_name }}</h1>
<p>Are you sure you want to delete this patient record? This action cannot be undone.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'patients' %}">Cancel</a>
</form>
{% endblock %}
