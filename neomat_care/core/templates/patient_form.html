{% extends "base.html" %}

{% block content %}
<div class="patient-form-container">
    <h1>{% if patient %}Edit{% else %}Add{% endif %} Patient</h1>
    <a href="{% url 'patients' %}" class="btn-back">Back to List</a>

    <form method="post">
        {% csrf_token %}
        <div class="form-grid">
            {% for field in form %}
                <div class="form-group">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}
                        <div class="error">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
        </div>
        <button type="submit" class="btn-submit">{% if patient %}Update{% else %}Add{% endif %} Patient</button>
    </form>
</div>
{% endblock %}
